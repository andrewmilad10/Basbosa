<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You ❤️</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    margin-top: 100px;
    background: #fff0f5;
    overflow: hidden;
}

/* Hearts */
.hearts {
    position: fixed;
    width: 100%;
    height: 100%;
    top: 0;
    left: 0;
    pointer-events: none;
}

.heart {
    position: absolute;
    bottom: -50px;
    color: red;
    font-size: 20px;
    animation: floatUp linear infinite;
}

@keyframes floatUp {
    0% { transform: translateY(0); opacity: 1; }
    100% { transform: translateY(-100vh); opacity: 0; }
}

/* Text */
h1 {
    color: #ff4d88;
}

/* Buttons */
button {
    padding: 12px 25px;
    font-size: 18px;
    margin: 10px;
    cursor: pointer;
    border: none;
    border-radius: 10px;
}

#yes {
    background-color: #4CAF50;
    color: white;
    position: absolute;
}

#no {
    background-color: #ff4d4d;
    color: white;
}
</style>
</head>

<body>

<div class="hearts" id="hearts"></div>

<h1>Do you want a big wedding? 😏💍</h1>

<button id="yes" onmouseover="moveYes()">Yes 😍</button>
<button id="no" onclick="noClicked()">No 😌</button>

<audio autoplay loop>
    <source src="song.mp3" type="audio/mpeg">
</audio>

<script>
// Move "Yes" button
function moveYes() {
    let button = document.getElementById("yes");
    button.style.left = Math.random() * (window.innerWidth - 100) + "px";
    button.style.top = Math.random() * (window.innerHeight - 50) + "px";
}

// When she clicks "No"
function noClicked() {
    document.body.innerHTML = `
        <h1>
        It's okay ❤️ we'll have a big wedding if it makes you happy 😍💍  
        <br><br>
        stupid fine basbosa 😂❤️
        </h1>
    `;
}

// Hearts animation
function createHeart() {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "❤️";

    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (Math.random() * 20 + 15) + "px";
    heart.style.animationDuration = (Math.random() * 3 + 3) + "s";

    document.getElementById("hearts").appendChild(heart);

    setTimeout(() => heart.remove(), 6000);
}

setInterval(createHeart, 300);
</script>

</body>
</html>
