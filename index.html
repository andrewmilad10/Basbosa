<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You ❤️</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #fff0f5;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    height: 100vh;
    overflow: hidden;
    text-align: center;
}

h1 {
    color: #ff4d88;
    margin-top: 40px;
}

/* BUTTON ROW (FIXED SIDE BY SIDE) */
.container {
    margin-top: 60px;
    display: flex;
    gap: 20px;
    position: relative;
}

/* BUTTONS */
button {
    padding: 12px 22px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    position: relative;
}

#yes {
    background: #4CAF50;
    color: white;
}

#no {
    background: #ff4d4d;
    color: white;
}

/* POPUP */
.popup {
    position: absolute;
    background: rgba(255, 77, 136, 0.95);
    color: white;
    padding: 10px 14px;
    border-radius: 12px;
    font-size: 15px;
    pointer-events: none;
    transform: translate(-50%, -50%);
    white-space: nowrap;
    z-index: 999;
}
</style>
</head>

<body>

<h1>Do you want a big wedding? 😏💍</h1>

<div class="container">
    <button id="no">No 😌</button>
    <button id="yes">Yes 😍</button>
</div>

<script>

/* ======================
   MESSAGES
====================== */
let messages = ["stupid 😜", "idiot 😂", "stupid fine idiot 😏", "ensy 😆"];
let index = 0;

/* ======================
   BUTTONS
====================== */
const yes = document.getElementById("yes");
const no = document.getElementById("no");

/* ======================
   SINGLE POPUP
====================== */
let popup = document.createElement("div");
popup.className = "popup";
document.body.appendChild(popup);
popup.style.display = "none";

/* ======================
   SAFE RANDOM POSITION (NO OFF SCREEN)
====================== */
function safeRandomPosition(btn) {
    const padding = 10;

    const maxX = window.innerWidth - btn.offsetWidth - padding;
    const maxY = window.innerHeight - btn.offsetHeight - 200; // keep under title area

    const x = Math.random() * maxX;
    const y = Math.random() * maxY + 120; // below title

    btn.style.position = "absolute";
    btn.style.left = x + "px";
    btn.style.top = y + "px";

    return btn.getBoundingClientRect();
}

/* ======================
   YES CLICK
====================== */
function moveYes() {

    const rect = safeRandomPosition(yes);

    popup.innerText = messages[index];
    index = (index + 1) % messages.length;

    popup.style.display = "block";

    /* place popup beside button */
    popup.style.left = (rect.right + 40) + "px";
    popup.style.top = (rect.top + rect.height / 2) + "px";

    /* flip if off screen */
    if (popup.getBoundingClientRect().right > window.innerWidth) {
        popup.style.left = (rect.left - 60) + "px";
    }
}

/* mobile support */
yes.addEventListener("click", moveYes);
yes.addEventListener("touchstart", (e) => {
    e.preventDefault();
    moveYes();
}, { passive: false });

/* ======================
   NO BUTTON FINAL SCREEN
====================== */
no.addEventListener("click", () => {
    document.body.innerHTML = `
        <h1>
        It's okay ❤️ we'll have a big wedding 😍💍  
        <br><br>
        stupid fine basbosa 😂❤️
        </h1>
    `;
});

</script>

</body>
</html>
