<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You ❤️</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    margin-top: 100px;
    background: #fff0f5;
    overflow: hidden;
}

/* Hearts */
.hearts {
    position: fixed;
    width: 100%;
    height: 100%;
    top: 0;
    left: 0;
    pointer-events: none;
}

.heart {
    position: absolute;
    bottom: -50px;
    color: red;
    font-size: 20px;
    animation: floatUp linear infinite;
}

@keyframes floatUp {
    0% { transform: translateY(0); opacity: 1; }
    100% { transform: translateY(-100vh); opacity: 0; }
}

/* Text */
h1 {
    color: #ff4d88;
}

/* Buttons */
button {
    padding: 12px 25px;
    font-size: 18px;
    margin: 10px;
    cursor: pointer;
    border: none;
    border-radius: 10px;
}

#yes {
    background-color: #4CAF50;
    color: white;
    position: absolute;
    left: 100px;
    top: 100px;
}

#no {
    background-color: #ff4d4d;
    color: white;
}

/* Popup message */
.popup {
    position: fixed;
    background: rgba(255, 77, 136, 0.9);
    color: white;
    padding: 10px 15px;
    border-radius: 10px;
    font-size: 16px;
    pointer-events: none;
    transform: translate(-50%, -50%);
    animation: fadeOut 1.5s forwards;
}

@keyframes fadeOut {
    0% { opacity: 1; }
    100% { opacity: 0; }
}
</style>
</head>

<body>

<div class="hearts" id="hearts"></div>

<h1>Do you want a big wedding? 😏💍</h1>

<button id="yes" onmouseover="moveYes()">Yes 😍</button>
<button id="no" onclick="noClicked()">No 😌</button>

<audio autoplay loop>
    <source src="song.mp3" type="audio/mpeg">
</audio>

<script>
/* =========================
   MESSAGE SYSTEM
========================= */
let messages = ["stupid 😜", "idiot 😂", "stupid fine idiot 😏", "ensy 😆"];
let index = 0;

/* =========================
   TOUCH + MOUSE TRACKING
========================= */
let mouseX = 0;
let mouseY = 0;

document.addEventListener("mousemove", (e) => {
    mouseX = e.clientX;
    mouseY = e.clientY;
});

document.addEventListener("touchmove", (e) => {
    mouseX = e.touches[0].clientX;
    mouseY = e.touches[0].clientY;
}, { passive: true });

/* Mobile panic boost */
let touchBoost = 1;
document.addEventListener("touchstart", () => {
    touchBoost = 3;
    setTimeout(() => touchBoost = 1, 400);
});

/* =========================
   BUTTON STATE
========================= */
let btnX = 100;
let btnY = 100;
let velocityX = 0;
let velocityY = 0;

/* =========================
   RUN AWAY AI BUTTON
========================= */
function animateButton() {
    const button = document.getElementById("yes");

    const dx = btnX - mouseX;
    const dy = btnY - mouseY;

    const distance = Math.sqrt(dx * dx + dy * dy);

    // escape behavior
    if (distance < 250) {
        let force = (250 - distance) / 250;

        velocityX += dx * 0.25 * force * touchBoost;
        velocityY += dy * 0.25 * force * touchBoost;
    }

    // friction (smooth movement)
    velocityX *= 0.85;
    velocityY *= 0.85;

    btnX += velocityX;
    btnY += velocityY;

    // boundaries
    let padding = 20;
    btnX = Math.max(padding, Math.min(window.innerWidth - 100 - padding, btnX));
    btnY = Math.max(padding, Math.min(window.innerHeight - 50 - padding, btnY));

    button.style.left = btnX + "px";
    button.style.top = btnY + "px";

    requestAnimationFrame(animateButton);
}
animateButton();

/* =========================
   POPUP SYSTEM
========================= */
function showPopup(text, button) {
    const popup = document.createElement("div");
    popup.classList.add("popup");
    popup.innerText = text;

    document.body.appendChild(popup);

    const rect = button.getBoundingClientRect();
    popup.style.left = rect.left + 50 + "px";
    popup.style.top = rect.top - 30 + "px";

    setTimeout(() => popup.remove(), 1500);
}

/* =========================
   YES BUTTON ACTION
========================= */
function moveYes() {
    const button = document.getElementById("yes");

    // panic boost
    velocityX += (Math.random() - 0.5) * 20;
    velocityY += (Math.random() - 0.5) * 20;

    showPopup(messages[index], button);
    index = (index + 1) % messages.length;
}

/* =========================
   NO BUTTON ACTION
========================= */
function noClicked() {
    document.body.innerHTML = `
        <h1>
        It's okay ❤️ we'll have a big wedding if it makes you happy 😍💍  
        <br><br>
        stupid fine basbosa 😂❤️
        </h1>
    `;
}

/* =========================
   HEART ANIMATION
========================= */
function createHeart() {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "❤️";

    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (Math.random() * 20 + 15) + "px";
    heart.style.animationDuration = (Math.random() * 3 + 3) + "s";

    document.getElementById("hearts").appendChild(heart);

    setTimeout(() => heart.remove(), 6000);
}

setInterval(createHeart, 300);
</script>

</body>
</html>
