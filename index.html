<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You ❤️</title>

<!-- 📱 Mobile / iPhone fix -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<style>
body {
    font-family: Arial;
    text-align: center;
    margin-top: 80px;
    background: #fff0f5;
    overflow: hidden;
}

/* Hearts */
.hearts {
    position: fixed;
    width: 100%;
    height: 100%;
    top: 0;
    left: 0;
    pointer-events: none;
}

.heart {
    position: absolute;
    bottom: -50px;
    color: red;
    font-size: 20px;
    animation: floatUp linear infinite;
}

@keyframes floatUp {
    0% { transform: translateY(0); opacity: 1; }
    100% { transform: translateY(-100vh); opacity: 0; }
}

/* Title */
h1 {
    color: #ff4d88;
    font-size: 22px;
    padding: 0 10px;
}

/* Buttons */
button {
    padding: 12px 22px;
    font-size: 18px;
    margin: 10px;
    cursor: pointer;
    border: none;
    border-radius: 10px;
    touch-action: manipulation;
}

#yes {
    background-color: #4CAF50;
    color: white;
    position: absolute;
}

#no {
    background-color: #ff4d4d;
    color: white;
}

/* Popup */
.popup {
    position: fixed;
    background: rgba(255, 77, 136, 0.95);
    color: white;
    padding: 12px 16px;
    border-radius: 12px;
    font-size: 16px;
    pointer-events: none;
    transform: translate(-50%, -50%);
    animation: fadeOut 3.5s forwards;
    max-width: 220px;
    text-align: center;
}

@keyframes fadeOut {
    0% { opacity: 1; }
    80% { opacity: 1; }
    100% { opacity: 0; }
}

/* Mobile tuning */
@media (max-width: 600px) {
    h1 { font-size: 18px; }
    button { font-size: 16px; padding: 10px 18px; }
}
</style>
</head>

<body>

<div class="hearts" id="hearts"></div>

<h1>Do you want a big wedding? 😏💍</h1>

<button id="yes" onmouseover="moveYes()" ontouchstart="moveYes()">Yes 😍</button>
<button id="no" onclick="noClicked()">No 😌</button>

<audio autoplay loop>
    <source src="song.mp3" type="audio/mpeg">
</audio>

<script>
/* =========================
   MESSAGES
========================= */
let messages = ["stupid 😜", "idiot 😂", "stupid fine idiot 😏", "ensy 😆"];
let index = 0;

/* =========================
   MOUSE + TOUCH TRACKING
========================= */
let mouseX = window.innerWidth / 2;
let mouseY = window.innerHeight / 2;

document.addEventListener("mousemove", (e) => {
    mouseX = e.clientX;
    mouseY = e.clientY;
});

document.addEventListener("touchmove", (e) => {
    mouseX = e.touches[0].clientX;
    mouseY = e.touches[0].clientY;
}, { passive: true });

/* =========================
   BUTTON INIT (FIXED)
========================= */
const button = document.getElementById("yes");

// real starting position (fix top-left bug)
let rect = button.getBoundingClientRect();
let btnX = rect.left;
let btnY = rect.top;

let velocityX = 0;
let velocityY = 0;

/* =========================
   TOUCH BOOST
========================= */
let touchBoost = 1;
document.addEventListener("touchstart", () => {
    touchBoost = 3;
    setTimeout(() => touchBoost = 1, 500);
});

/* =========================
   AI RUNAWAY BUTTON
========================= */
function animateButton() {
    const dx = btnX - mouseX;
    const dy = btnY - mouseY;

    const distance = Math.sqrt(dx * dx + dy * dy);

    if (distance < 260) {
        let force = (260 - distance) / 260;

        velocityX += dx * 0.25 * force * touchBoost;
        velocityY += dy * 0.25 * force * touchBoost;
    }

    // smooth motion
    velocityX *= 0.85;
    velocityY *= 0.85;

    btnX += velocityX;
    btnY += velocityY;

    // boundaries
    let padding = 10;
    btnX = Math.max(padding, Math.min(window.innerWidth - 120, btnX));
    btnY = Math.max(padding, Math.min(window.innerHeight - 60, btnY));

    button.style.left = btnX + "px";
    button.style.top = btnY + "px";

    requestAnimationFrame(animateButton);
}

animateButton();

/* =========================
   POPUP SYSTEM (NO SPAM)
========================= */
let popupCooldown = false;

function showPopup(text, button) {
    if (popupCooldown) return;

    popupCooldown = true;

    const popup = document.createElement("div");
    popup.classList.add("popup");
    popup.innerText = text;

    document.body.appendChild(popup);

    const rect = button.getBoundingClientRect();
    popup.style.left = rect.left + 50 + "px";
    popup.style.top = rect.top - 40 + "px";

    setTimeout(() => {
        popup.remove();
        popupCooldown = false;
    }, 3500);
}

/* =========================
   YES BUTTON
========================= */
function moveYes() {
    velocityX += (Math.random() - 0.5) * 20;
    velocityY += (Math.random() - 0.5) * 20;

    showPopup(messages[index], button);
    index = (index + 1) % messages.length;
}

/* =========================
   NO BUTTON
========================= */
function noClicked() {
    document.body.innerHTML = `
        <h1>
        It's okay ❤️ we'll have a big wedding 😍💍  
        <br><br>
        stupid fine basbosa 😂❤️
        </h1>
    `;
}

/* =========================
   HEARTS
========================= */
function createHeart() {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "❤️";

    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (Math.random() * 20 + 15) + "px";
    heart.style.animationDuration = (Math.random() * 3 + 3) + "s";

    document.getElementById("hearts").appendChild(heart);

    setTimeout(() => heart.remove(), 6000);
}

setInterval(createHeart, 300);
</script>

</body>
</html>
