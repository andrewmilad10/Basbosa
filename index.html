<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You ❤️</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #fff0f5;
    text-align: center;
    overflow: hidden;
}

h1 {
    color: #ff4d88;
    margin-top: 20px;
}

/* YES BUTTON (default position handled by browser first) */
#yes {
    position: absolute;
    padding: 12px 22px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    background: #4CAF50;
    color: white;
    cursor: pointer;
}

/* NO BUTTON */
#no {
    margin-top: 80px;
    padding: 12px 22px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    background: #ff4d4d;
    color: white;
    cursor: pointer;
}

/* POPUP */
.popup {
    position: fixed;
    background: rgba(255, 77, 136, 0.95);
    color: white;
    padding: 10px 14px;
    border-radius: 12px;
    font-size: 15px;
    pointer-events: none;
    transform: translate(-50%, -50%);
    animation: fadeOut 3.5s forwards;
}

@keyframes fadeOut {
    0% { opacity: 1; }
    80% { opacity: 1; }
    100% { opacity: 0; }
}
</style>
</head>

<body>

<h1>Do you want a big wedding? 😏💍</h1>

<button id="yes">Yes 😍</button>
<button id="no">No 😌</button>

<script>

/* ======================
   MESSAGES
====================== */
let messages = ["stupid 😜", "idiot 😂", "stupid fine idiot 😏", "ensy 😆"];
let index = 0;

const button = document.getElementById("yes");

/* ======================
   START POSITION (DEFAULT FLOW)
   -> browser places it first, then we read it
====================== */
let rect = button.getBoundingClientRect();

let btnX = rect.left;
let btnY = rect.top;

/* ======================
   MOVE BUTTON ON CLICK ONLY
====================== */
function moveButton() {
    const maxX = window.innerWidth - button.offsetWidth;
    const maxY = window.innerHeight - button.offsetHeight;

    btnX = Math.random() * maxX;
    btnY = Math.random() * maxY;

    button.style.left = btnX + "px";
    button.style.top = btnY + "px";

    showPopup(messages[index]);
    index = (index + 1) % messages.length;
}

/* click + mobile tap */
button.addEventListener("click", moveButton);
button.addEventListener("touchstart", (e) => {
    e.preventDefault();
    moveButton();
}, { passive: false });

/* ======================
   POPUP (NO SPAM)
====================== */
let popupLock = false;

function showPopup(text) {
    if (popupLock) return;

    popupLock = true;

    const p = document.createElement("div");
    p.className = "popup";
    p.innerText = text;

    document.body.appendChild(p);

    setTimeout(() => {
        p.remove();
        popupLock = false;
    }, 3500);
}

/* ======================
   NO BUTTON
====================== */
document.getElementById("no").onclick = () => {
    document.body.innerHTML = `
        <h1>
        It's okay ❤️ we'll have a big wedding 😍💍  
        <br><br>
        stupid fine basbosa 😂❤️
        </h1>
    `;
};

</script>

</body>
</html>
