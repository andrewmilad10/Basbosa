<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You ❤️</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #fff0f5;
    text-align: center;
    overflow: hidden;
}

h1 {
    color: #ff4d88;
    margin-top: 40px;
}

button {
    padding: 12px 22px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
}

#yes {
    background: #4CAF50;
    color: white;
    position: absolute;
}

#no {
    background: #ff4d4d;
    color: white;
    position: relative;
}

.toast {
    position: fixed;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%) translateY(16px) scale(0.92);
    background: rgba(255, 77, 136, 0.95);
    color: white;
    padding: 12px 20px;
    border-radius: 20px;
    font-size: 15px;
    white-space: nowrap;
    pointer-events: none;
    z-index: 9999;
    opacity: 0;
    transition: opacity 0.25s ease, transform 0.25s ease;
}

.toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0) scale(1);
}

.toast.hide {
    opacity: 0;
    transform: translateX(-50%) translateY(8px) scale(0.95);
    transition: opacity 0.3s ease, transform 0.3s ease;
}
</style>
</head>

<body>

<h1>Do you want a big wedding? 😏💍</h1>

<div style="margin-top: 60px; display: flex; justify-content: center; gap: 20px;">
    <button id="no">No 😌</button>
    <button id="yes">Yes 😍</button>
</div>

<script>

const messages = ["stupid 😜", "idiot 😂", "stupid fine idiot 😏", "ensy 😆"];
let index = 0;

const yes = document.getElementById("yes");
const no = document.getElementById("no");

function getVW() {
    return window.visualViewport ? window.visualViewport.width : window.innerWidth;
}

function getVH() {
    return window.visualViewport ? window.visualViewport.height : window.innerHeight;
}

function safeMove(btn) {
    const padding = 15;
    const vw = getVW();
    const vh = getVH();
    const maxX = vw - btn.offsetWidth - padding;
    const maxY = vh - btn.offsetHeight - 200;
    const x = Math.random() * maxX + padding;
    const y = Math.random() * maxY + 120;
    btn.style.position = "absolute";
    btn.style.left = x + "px";
    btn.style.top = y + "px";
}

function showToast(text) {
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.textContent = text;
    document.body.appendChild(toast);

    requestAnimationFrame(() => {
        requestAnimationFrame(() => toast.classList.add('show'));
    });

    setTimeout(() => {
        toast.classList.remove('show');
        toast.classList.add('hide');
        setTimeout(() => toast.remove(), 350);
    }, 1200);
}

function moveYes() {
    safeMove(yes);
    showToast(messages[index % messages.length]);
    index++;
}

yes.addEventListener("click", moveYes);
yes.addEventListener("touchend", (e) => {
    e.preventDefault();
    moveYes();
}, { passive: false });

no.addEventListener("click", () => {
    document.body.innerHTML = `
        <h1 style="color:#ff4d88; margin-top:80px;">
            It's okay ❤️ we'll have a big wedding 😍💍
            <br><br>
            stupid fine basbosa 😂❤️
        </h1>
    `;
});

</script>
</body>
</html>
