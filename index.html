<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You ❤️</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #fff0f5;
    text-align: center;
    overflow: hidden;
}

h1 {
    color: #ff4d88;
    margin: 15px 0;
}

/* CENTER ARENA */
#arena {
    position: relative;
    width: 85vw;
    height: 70vh;
    margin: 10px auto;
    border: 3px dashed #ff4d88;
    border-radius: 15px;
    background: rgba(255,255,255,0.5);
    overflow: hidden;
}

/* BUTTON */
#yes {
    position: absolute;
    padding: 12px 22px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    background: #4CAF50;
    color: white;
    cursor: pointer;
    touch-action: manipulation;
}

/* NO BUTTON */
#no {
    margin-top: 10px;
    padding: 12px 22px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    background: #ff4d4d;
    color: white;
    cursor: pointer;
}

/* POPUP */
.popup {
    position: fixed;
    background: rgba(255, 77, 136, 0.95);
    color: white;
    padding: 10px 14px;
    border-radius: 12px;
    font-size: 15px;
    pointer-events: none;
    transform: translate(-50%, -50%);
    animation: fadeOut 3.5s forwards;
}

@keyframes fadeOut {
    0% { opacity: 1; }
    80% { opacity: 1; }
    100% { opacity: 0; }
}
</style>
</head>

<body>

<h1>Do you want a big wedding? 😏💍</h1>

<div id="arena">
    <button id="yes">Yes 😍</button>
</div>

<button id="no">No 😌</button>

<script>
/* ======================
   MESSAGES
====================== */
let messages = ["stupid 😜", "idiot 😂", "stupid fine idiot 😏", "ensy 😆"];
let index = 0;

/* ======================
   SETUP
====================== */
const arena = document.getElementById("arena");
const button = document.getElementById("yes");

function moveButtonRandom() {
    const maxX = arena.clientWidth - button.offsetWidth;
    const maxY = arena.clientHeight - button.offsetHeight;

    const x = Math.random() * maxX;
    const y = Math.random() * maxY;

    button.style.left = x + "px";
    button.style.top = y + "px";
}

/* start in middle */
moveButtonRandom();

/* ======================
   CLICK = MOVE + POPUP
====================== */
button.addEventListener("click", () => {
    moveButtonRandom();
    showPopup(messages[index]);
    index = (index + 1) % messages.length;
});

/* mobile support */
button.addEventListener("touchstart", (e) => {
    e.preventDefault();
    moveButtonRandom();
    showPopup(messages[index]);
    index = (index + 1) % messages.length;
}, { passive: false });

/* ======================
   POPUP SYSTEM (NO SPAM)
====================== */
let popupLock = false;

function showPopup(text) {
    if (popupLock) return;

    popupLock = true;

    const p = document.createElement("div");
    p.className = "popup";
    p.innerText = text;

    document.body.appendChild(p);

    setTimeout(() => {
        p.remove();
        popupLock = false;
    }, 3500);
}

/* ======================
   NO BUTTON
====================== */
document.getElementById("no").onclick = () => {
    document.body.innerHTML = `
        <h1>
        It's okay ❤️ we'll have a big wedding 😍💍  
        <br><br>
        stupid fine basbosa 😂❤️
        </h1>
    `;
};
</script>

</body>
</html>
