<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You ❤️</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #fff0f5;
    text-align: center;
    overflow: hidden;
}

h1 {
    color: #ff4d88;
    margin-top: 30px;
}

/* BUTTON WRAPPER */
.container {
    margin-top: 80px;
    display: flex;
    justify-content: center;
    gap: 20px;
}

/* BUTTONS */
button {
    padding: 12px 22px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}

#yes {
    background: #4CAF50;
    color: white;
}

#no {
    background: #ff4d4d;
    color: white;
}

/* POPUP */
.popup {
    position: absolute;
    background: rgba(255, 77, 136, 0.95);
    color: white;
    padding: 10px 14px;
    border-radius: 12px;
    font-size: 15px;
    pointer-events: none;
    transform: translate(-50%, -50%);
    animation: fadeOut 3.2s forwards;
    white-space: nowrap;
}

@keyframes fadeOut {
    0% { opacity: 1; }
    80% { opacity: 1; }
    100% { opacity: 0; }
}
</style>
</head>

<body>

<h1>Do you want a big wedding? 😏💍</h1>

<div class="container">
    <button id="yes">Yes 😍</button>
    <button id="no">No 😌</button>
</div>

<script>

/* ======================
   MESSAGES
====================== */
let messages = ["stupid 😜", "idiot 😂", "stupid fine idiot 😏", "ensy 😆"];
let index = 0;

/* ======================
   YES BUTTON POPUP
====================== */
const yesBtn = document.getElementById("yes");
const noBtn = document.getElementById("no");

yesBtn.addEventListener("click", (e) => {
    showPopup(e.target, messages[index]);
    index = (index + 1) % messages.length;
});

/* mobile support */
yesBtn.addEventListener("touchstart", (e) => {
    e.preventDefault();
    showPopup(yesBtn, messages[index]);
    index = (index + 1) % messages.length;
}, { passive: false });

/* ======================
   NO BUTTON ACTION
====================== */
noBtn.addEventListener("click", (e) => {
    showPopup(e.target, "okay 😌❤️");
});

/* ======================
   POPUP NEXT TO BUTTON
====================== */
function showPopup(button, text) {

    const popup = document.createElement("div");
    popup.className = "popup";
    popup.innerText = text;

    document.body.appendChild(popup);

    const rect = button.getBoundingClientRect();

    // position beside button
    popup.style.left = (rect.right + 60) + "px";
    popup.style.top = (rect.top + rect.height / 2) + "px";

    // if off screen → flip left side
    if (popup.getBoundingClientRect().right > window.innerWidth) {
        popup.style.left = (rect.left - 60) + "px";
    }

    setTimeout(() => popup.remove(), 3200);
}

</script>

</body>
</html>
