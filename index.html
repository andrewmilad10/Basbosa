<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You ❤️</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #fff0f5;
    text-align: center;
    overflow: hidden;
}

h1 {
    color: #ff4d88;
    margin-top: 40px;
}

/* BUTTON ROW */
.container {
    margin-top: 60px;
    display: flex;
    justify-content: center;
    gap: 20px;
}

/* BUTTONS */
button {
    padding: 12px 22px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}

#yes {
    background: #4CAF50;
    color: white;
    position: absolute;
}

#no {
    background: #ff4d4d;
    color: white;
    position: relative;
}

/* POPUP */
.popup {
    position: absolute;
    background: rgba(255, 77, 136, 0.95);
    color: white;
    padding: 10px 14px;
    border-radius: 12px;
    font-size: 15px;
    pointer-events: none;
    transform: translate(-50%, -50%);
    white-space: nowrap;
}
</style>
</head>

<body>

<h1>Do you want a big wedding? 😏💍</h1>

<div class="container">
    <button id="no">No 😌</button>
    <button id="yes">Yes 😍</button>
</div>

<script>

/* ======================
   MESSAGES
====================== */
let messages = ["stupid 😜", "idiot 😂", "stupid fine idiot 😏", "ensy 😆"];
let index = 0;

/* ======================
   BUTTONS
====================== */
const yes = document.getElementById("yes");
const no = document.getElementById("no");

/* ======================
   SINGLE POPUP
====================== */
let popup = document.createElement("div");
popup.className = "popup";
document.body.appendChild(popup);
popup.style.display = "none";

/* ======================
   MOBILE SAFE VIEWPORT FIX
====================== */
function getVW() {
    return window.visualViewport ? window.visualViewport.width : window.innerWidth;
}

function getVH() {
    return window.visualViewport ? window.visualViewport.height : window.innerHeight;
}

/* ======================
   SAFE RANDOM POSITION
====================== */
function safeMove(btn) {

    const padding = 15;

    const vw = getVW();
    const vh = getVH();

    const maxX = vw - btn.offsetWidth - padding;
    const maxY = vh - btn.offsetHeight - 200;

    const x = Math.random() * maxX + padding;
    const y = Math.random() * maxY + 120;

    btn.style.position = "absolute";
    btn.style.left = x + "px";
    btn.style.top = y + "px";

    return btn.getBoundingClientRect();
}

/* ======================
   YES CLICK
====================== */
// function moveYes() {

//     const rect = safeMove(yes);

//     popup.innerText = messages[index];
//     index = (index + 1) % messages.length;

//     popup.style.display = "block";

//     const centerX = rect.left + rect.width / 2;
//     const centerY = rect.top + rect.height / 2;

//     const popupWidth = 120;

//     let leftPos = centerX + 40;

//     if (leftPos + popupWidth > getVW()) {
//         leftPos = centerX - 40;
//     }

//     popup.style.left = leftPos + "px";
//     popup.style.top = centerY + "px";

//     /* ⏱️ DISAPPEAR AFTER 1 SECOND */
//     setTimeout(() => {
//         popup.style.display = "none";
//     }, 1000);
// }

    function moveYes() {

    safeMove(yes);

    popup.innerText = messages[index];
    index = (index + 1) % messages.length;

    /* show popup */
    popup.style.opacity = "1";
    popup.style.transform = "translate(-50%, 0px)";

    /* reset animation trigger */
    clearTimeout(popup.timer);

    popup.timer = setTimeout(() => {
        popup.style.opacity = "0";
        popup.style.transform = "translate(-50%, 20px)";
    }, 1000);
}

/* touch support */
yes.addEventListener("click", moveYes);
yes.addEventListener("touchstart", (e) => {
    e.preventDefault();
    moveYes();
}, { passive: false });

/* ======================
   NO BUTTON FINAL SCREEN
====================== */
no.addEventListener("click", () => {
    document.body.innerHTML = `
        <h1>
        It's okay ❤️ we'll have a big wedding 😍💍  
        <br><br>
        stupid fine basbosa 😂❤️
        </h1>
    `;
});

</script>

</body>
</html>
