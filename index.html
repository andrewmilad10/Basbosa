<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You ❤️</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #fff0f5;
    overflow: hidden;
    text-align: center;
}

h1 {
    color: #ff4d88;
    margin: 15px 0;
}

/* 🎯 ARENA FIXED CENTER */
#arena {
    position: relative;
    width: 85vw;
    height: 70vh;
    margin: 10px auto;
    border: 3px dashed #ff4d88;
    border-radius: 15px;
    overflow: hidden;
    background: rgba(255,255,255,0.5);
}

/* BUTTON */
button {
    padding: 12px 22px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    touch-action: manipulation;
}

#yes {
    position: absolute;
    background: #4CAF50;
    color: white;
}

#no {
    background: #ff4d4d;
    color: white;
    margin-top: 10px;
}

/* POPUP */
.popup {
    position: fixed;
    background: rgba(255, 77, 136, 0.95);
    color: white;
    padding: 10px 14px;
    border-radius: 12px;
    font-size: 15px;
    pointer-events: none;
    transform: translate(-50%, -50%);
    animation: fadeOut 3.2s forwards;
}

@keyframes fadeOut {
    0% { opacity: 1; }
    80% { opacity: 1; }
    100% { opacity: 0; }
}
</style>
</head>

<body>

<h1>Do you want a big wedding? 😏💍</h1>

<div id="arena">
    <button id="yes" onmouseover="moveYes()" ontouchstart="moveYes()">Yes 😍</button>
</div>

<button id="no" onclick="noClicked()">No 😌</button>

<script>

/* =======================
   MESSAGES
======================= */
let messages = ["stupid 😜", "idiot 😂", "stupid fine idiot 😏", "ensy 😆"];
let index = 0;

/* =======================
   ARENA + BUTTON SETUP
======================= */
const arena = document.getElementById("arena");
const button = document.getElementById("yes");

let arenaRect = arena.getBoundingClientRect();

/* IMPORTANT FIX: position inside arena */
let btnX = arena.clientWidth / 2;
let btnY = arena.clientHeight / 2;

let vx = 0;
let vy = 0;

/* =======================
   POINTER TRACKING (INSIDE ARENA ONLY)
======================= */
let mouseX = btnX;
let mouseY = btnY;

function updateArenaRect() {
    arenaRect = arena.getBoundingClientRect();
}

window.addEventListener("resize", updateArenaRect);

arena.addEventListener("mousemove", (e) => {
    updateArenaRect();
    mouseX = e.clientX - arenaRect.left;
    mouseY = e.clientY - arenaRect.top;
});

arena.addEventListener("touchmove", (e) => {
    updateArenaRect();
    mouseX = e.touches[0].clientX - arenaRect.left;
    mouseY = e.touches[0].clientY - arenaRect.top;
}, { passive: true });

/* =======================
   TOUCH BOOST
======================= */
let boost = 1;

document.addEventListener("touchstart", () => {
    boost = 3;
    setTimeout(() => boost = 1, 500);
});

/* =======================
   AI MOVEMENT (LOCKED IN ARENA)
======================= */
function animate() {
    const dx = btnX - mouseX;
    const dy = btnY - mouseY;

    const dist = Math.sqrt(dx*dx + dy*dy);

    if (dist < 220) {
        let f = (220 - dist) / 220;
        vx += dx * 0.25 * f * boost;
        vy += dy * 0.25 * f * boost;
    }

    vx *= 0.86;
    vy *= 0.86;

    btnX += vx;
    btnY += vy;

    /* 🚫 HARD BOUNDARIES (THIS FIXES EDGE BUG) */
    const maxX = arena.clientWidth - button.offsetWidth;
    const maxY = arena.clientHeight - button.offsetHeight;

    btnX = Math.max(0, Math.min(maxX, btnX));
    btnY = Math.max(0, Math.min(maxY, btnY));

    button.style.left = btnX + "px";
    button.style.top = btnY + "px";

    requestAnimationFrame(animate);
}

animate();

/* =======================
   POPUP (NO SPAM)
======================= */
let popupLock = false;

function showPopup(text) {
    if (popupLock) return;

    popupLock = true;

    const p = document.createElement("div");
    p.className = "popup";
    p.innerText = text;

    document.body.appendChild(p);

    setTimeout(() => {
        p.remove();
        popupLock = false;
    }, 3500);
}

/* =======================
   YES BUTTON
======================= */
function moveYes() {
    vx += (Math.random() - 0.5) * 20;
    vy += (Math.random() - 0.5) * 20;

    showPopup(messages[index]);
    index = (index + 1) % messages.length;
}

/* =======================
   NO BUTTON
======================= */
function noClicked() {
    document.body.innerHTML = `
        <h1>
        It's okay ❤️ we'll have a big wedding 😍💍  
        <br><br>
        stupid fine basbosa 😂❤️
        </h1>
    `;
}
</script>

</body>
</html>
