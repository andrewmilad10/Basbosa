<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You ❤️</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<style>
body {
    font-family: Arial;
    background: #fff0f5;
    margin: 0;
    overflow: hidden;
    text-align: center;
}

/* Title */
h1 {
    color: #ff4d88;
    margin-top: 20px;
    font-size: 22px;
}

/* 🎯 CENTER GAME FRAME */
#arena {
    position: relative;
    width: 85vw;
    height: 70vh;
    margin: 20px auto;
    border: 3px dashed #ff4d88;
    border-radius: 15px;
    overflow: hidden;
    background: rgba(255,255,255,0.4);
}

/* Buttons */
button {
    padding: 12px 22px;
    font-size: 18px;
    cursor: pointer;
    border: none;
    border-radius: 10px;
    touch-action: manipulation;
}

#yes {
    background: #4CAF50;
    color: white;
    position: absolute;
}

#no {
    background: #ff4d4d;
    color: white;
    margin-top: 10px;
}

/* Popup */
.popup {
    position: fixed;
    background: rgba(255, 77, 136, 0.95);
    color: white;
    padding: 12px 16px;
    border-radius: 12px;
    font-size: 16px;
    pointer-events: none;
    transform: translate(-50%, -50%);
    animation: fadeOut 3.5s forwards;
}

@keyframes fadeOut {
    0% { opacity: 1; }
    80% { opacity: 1; }
    100% { opacity: 0; }
}
</style>
</head>

<body>

<h1>Do you want a big wedding? 😏💍</h1>

<div id="arena">
    <button id="yes" onmouseover="moveYes()" ontouchstart="moveYes()">Yes 😍</button>
</div>

<button id="no" onclick="noClicked()">No 😌</button>

<script>
/* =========================
   MESSAGES
========================= */
let messages = ["stupid 😜", "idiot 😂", "stupid fine idiot 😏", "ensy 😆"];
let index = 0;

/* =========================
   ARENA (FRAME LIMITS)
========================= */
const arena = document.getElementById("arena");
const button = document.getElementById("yes");

let arenaRect = arena.getBoundingClientRect();

/* button state inside arena */
let btnX = 50;
let btnY = 50;
let velocityX = 0;
let velocityY = 0;

/* =========================
   INPUT TRACKING (relative to arena)
========================= */
let mouseX = 0;
let mouseY = 0;

arena.addEventListener("mousemove", (e) => {
    const rect = arena.getBoundingClientRect();
    mouseX = e.clientX - rect.left;
    mouseY = e.clientY - rect.top;
});

arena.addEventListener("touchmove", (e) => {
    const rect = arena.getBoundingClientRect();
    mouseX = e.touches[0].clientX - rect.left;
    mouseY = e.touches[0].clientY - rect.top;
}, { passive: true });

/* =========================
   TOUCH BOOST
========================= */
let touchBoost = 1;
document.addEventListener("touchstart", () => {
    touchBoost = 3;
    setTimeout(() => touchBoost = 1, 500);
});

/* =========================
   AI MOVEMENT INSIDE FRAME
========================= */
function animateButton() {
    const dx = btnX - mouseX;
    const dy = btnY - mouseY;

    const distance = Math.sqrt(dx * dx + dy * dy);

    if (distance < 200) {
        let force = (200 - distance) / 200;

        velocityX += dx * 0.25 * force * touchBoost;
        velocityY += dy * 0.25 * force * touchBoost;
    }

    velocityX *= 0.85;
    velocityY *= 0.85;

    btnX += velocityX;
    btnY += velocityY;

    /* 🚧 IMPORTANT: boundaries INSIDE ARENA */
    const maxX = arena.clientWidth - 100;
    const maxY = arena.clientHeight - 50;

    btnX = Math.max(0, Math.min(maxX, btnX));
    btnY = Math.max(0, Math.min(maxY, btnY));

    button.style.left = btnX + "px";
    button.style.top = btnY + "px";

    requestAnimationFrame(animateButton);
}
animateButton();

/* =========================
   POPUP (NO SPAM)
========================= */
let popupCooldown = false;

function showPopup(text) {
    if (popupCooldown) return;

    popupCooldown = true;

    const popup = document.createElement("div");
    popup.classList.add("popup");
    popup.innerText = text;

    document.body.appendChild(popup);

    setTimeout(() => {
        popup.remove();
        popupCooldown = false;
    }, 3500);
}

/* =========================
   YES BUTTON
========================= */
function moveYes() {
    velocityX += (Math.random() - 0.5) * 20;
    velocityY += (Math.random() - 0.5) * 20;

    showPopup(messages[index]);
    index = (index + 1) % messages.length;
}

/* =========================
   NO BUTTON
========================= */
function noClicked() {
    document.body.innerHTML = `
        <h1>
        It's okay ❤️ we'll have a big wedding 😍💍  
        <br><br>
        stupid fine basbosa 😂❤️
        </h1>
    `;
}
</script>

</body>
</html>
