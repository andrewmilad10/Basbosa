<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You ❤️</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #fff0f5;
    text-align: center;
    overflow: hidden;
}

h1 {
    color: #ff4d88;
    margin-top: 30px;
}

/* BUTTONS */
.container {
    margin-top: 80px;
    position: relative;
}

button {
    padding: 12px 22px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}

/* YES button starts near NO */
#yes {
    position: absolute;
    background: #4CAF50;
    color: white;
}

#no {
    position: absolute;
    background: #ff4d4d;
    color: white;
}

/* POPUP (single) */
.popup {
    position: absolute;
    background: rgba(255, 77, 136, 0.95);
    color: white;
    padding: 10px 14px;
    border-radius: 12px;
    font-size: 15px;
    pointer-events: none;
    transform: translate(-50%, -50%);
    white-space: nowrap;
}
</style>
</head>

<body>

<h1>Do you want a big wedding? 😏💍</h1>

<div class="container">
    <button id="no">No 😌</button>
    <button id="yes">Yes 😍</button>
</div>

<script>

/* ======================
   MESSAGES
====================== */
let messages = ["stupid 😜", "idiot 😂", "stupid fine idiot 😏", "ensy 😆"];
let index = 0;

/* ======================
   BUTTONS
====================== */
const yes = document.getElementById("yes");
const no = document.getElementById("no");

/* position NO first (center-ish) */
no.style.left = "calc(50% - 100px)";
no.style.top = "200px";

/* YES starts BESIDE NO */
let yesX = no.getBoundingClientRect().left + 120;
let yesY = no.getBoundingClientRect().top;

yes.style.left = yesX + "px";
yes.style.top = yesY + "px";

/* ======================
   SINGLE POPUP
====================== */
let popup = document.createElement("div");
popup.className = "popup";
document.body.appendChild(popup);
popup.style.display = "none";

/* ======================
   MOVE YES BUTTON
====================== */
function moveYes() {

    const maxX = window.innerWidth - yes.offsetWidth;
    const maxY = window.innerHeight - yes.offsetHeight;

    yesX = Math.random() * maxX;
    yesY = Math.random() * maxY;

    yes.style.left = yesX + "px";
    yes.style.top = yesY + "px";

    /* update popup */
    popup.innerText = messages[index];
    index = (index + 1) % messages.length;

    popup.style.display = "block";

    const rect = yes.getBoundingClientRect();

    popup.style.left = (rect.right + 40) + "px";
    popup.style.top = (rect.top + rect.height / 2) + "px";

    /* fix if off screen */
    if (popup.getBoundingClientRect().right > window.innerWidth) {
        popup.style.left = (rect.left - 60) + "px";
    }
}

/* click + touch */
yes.addEventListener("click", moveYes);
yes.addEventListener("touchstart", (e) => {
    e.preventDefault();
    moveYes();
}, { passive: false });

/* ======================
   NO BUTTON FINAL PAGE
====================== */
no.addEventListener("click", () => {
    document.body.innerHTML = `
        <h1>
        It's okay ❤️ we'll have a big wedding 😍💍  
        <br><br>
        stupid fine basbosa 😂❤️
        </h1>
    `;
});

</script>

</body>
</html>
