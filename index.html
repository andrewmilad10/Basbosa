<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You ❤️</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #fff0f5;
    text-align: center;
    overflow: hidden;
}

h1 {
    color: #ff4d88;
    margin-top: 30px;
}

/* BUTTONS */
.container {
    margin-top: 80px;
}

button {
    padding: 12px 22px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    margin: 10px;
}

#yes {
    background: #4CAF50;
    color: white;
    position: absolute;
    left: 100px;
    top: 200px;
}

#no {
    background: #ff4d4d;
    color: white;
}

/* SINGLE POPUP */
.popup {
    position: absolute;
    background: rgba(255, 77, 136, 0.95);
    color: white;
    padding: 10px 14px;
    border-radius: 12px;
    font-size: 15px;
    pointer-events: none;
    transform: translate(-50%, -50%);
    white-space: nowrap;
}
</style>
</head>

<body>

<h1>Do you want a big wedding? 😏💍</h1>

<div class="container">
    <button id="yes">Yes 😍</button>
    <button id="no">No 😌</button>
</div>

<script>

/* ======================
   MESSAGES
====================== */
let messages = ["stupid 😜", "idiot 😂", "stupid fine idiot 😏", "ensy 😆"];
let index = 0;

/* ======================
   BUTTON
====================== */
const button = document.getElementById("yes");

/* popup (ONLY ONE) */
let popup = document.createElement("div");
popup.className = "popup";
document.body.appendChild(popup);
popup.style.display = "none";

/* ======================
   MOVE + SHOW POPUP
====================== */
function moveAndShow() {

    /* move button randomly */
    const maxX = window.innerWidth - button.offsetWidth;
    const maxY = window.innerHeight - button.offsetHeight;

    const x = Math.random() * maxX;
    const y = Math.random() * maxY;

    button.style.left = x + "px";
    button.style.top = y + "px";

    /* update popup text */
    popup.innerText = messages[index];
    index = (index + 1) % messages.length;

    /* show popup */
    popup.style.display = "block";

    const rect = button.getBoundingClientRect();

    popup.style.left = (rect.left + rect.width + 50) + "px";
    popup.style.top = (rect.top + rect.height / 2) + "px";

    /* fix if off screen */
    if (popup.getBoundingClientRect().right > window.innerWidth) {
        popup.style.left = (rect.left - 60) + "px";
    }
}

/* click + touch */
button.addEventListener("click", moveAndShow);

button.addEventListener("touchstart", (e) => {
    e.preventDefault();
    moveAndShow();
}, { passive: false });

/* NO button */
document.getElementById("no").onclick = () => {
    popup.innerText = "okay 😌❤️";
    popup.style.display = "block";
    popup.style.left = "50%";
    popup.style.top = "60%";
};

</script>

</body>
</html>
